<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{{ app_name or '登录' }}</title>
  <style>
    :root {
      --bg: #0b1322;
      --bg-soft: #101b2d;
      --panel: rgba(22, 33, 52, 0.82);
      --panel-2: rgba(17, 41, 58, 0.66);
      --line: rgba(103, 125, 155, 0.28);
      --line-strong: rgba(45, 212, 191, 0.36);
      --silver: #e5edf7;
      --silver-2: #9fb3c8;
      --silver-3: #64748b;
      --text: #eaf2ff;
      --muted: rgba(203, 213, 225, 0.62);
      --error: #fecaca;
      --error-bg: rgba(239, 68, 68, 0.12);
      --accent: #14b8a6;
      --accent-2: #059669;
      --radius-xl: 30px;
      --radius-lg: 18px;
      --shadow: 0 28px 70px rgba(0, 0, 0, 0.36);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 4%, rgba(20,184,166,0.13), transparent 32%),
        radial-gradient(circle at 84% 10%, rgba(45,91,150,0.16), transparent 34%),
        linear-gradient(180deg, #0b1322 0%, #0b1220 48%, #09101d 100%);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(26px, env(safe-area-inset-top)) 18px max(26px, env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    .stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148,163,184,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.04) 1px, transparent 1px);
      background-size: 46px 46px;
      opacity: 0.17;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.8), transparent 80%);
    }

    .login-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .login-card {
      position: relative;
      width: min(100%, 430px);
      padding: 34px 24px 26px;
      border-radius: var(--radius-xl);
      background:
        radial-gradient(circle at 18% 0%, rgba(20,184,166,0.12), transparent 36%),
        linear-gradient(135deg, rgba(255,255,255,0.065), transparent 24%),
        linear-gradient(180deg, rgba(22,33,52,0.88), rgba(17,29,46,0.82));
      border: 1px solid var(--line);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.42), transparent 24%, transparent 70%, rgba(255,255,255,0.18));
      opacity: 0.24;
      pointer-events: none;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      padding: 1px;
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .mark {
      width: 82px;
      height: 82px;
      margin: 0 auto 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 32% 22%, rgba(255,255,255,0.16), transparent 38%),
        linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.015));
      border: 1px solid rgba(225, 245, 255, 0.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 12px 28px rgba(0, 0, 0, 0.24);
    }

    .mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 0 0 26px;
      text-align: center;
      font-size: clamp(32px, 7vw, 44px);
      line-height: 1.12;
      letter-spacing: 1.8px;
      font-weight: 800;
      background: linear-gradient(180deg, #f8fbff 0%, #cfe4f8 54%, #93c5fd 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 16px 36px rgba(0,0,0,0.44);
    }

    .alert {
      width: min(100%, 340px);
      margin: 0 auto 16px;
      padding: 11px 14px;
      border-radius: 14px;
      color: var(--error);
      background: var(--error-bg);
      border: 1px solid rgba(255, 150, 150, 0.16);
      text-align: center;
      font-size: 14px;
    }

    .login-form {
      width: min(100%, 340px);
      margin: 0 auto;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: none;
      margin: 0 0 8px 2px;
      color: rgba(245,245,247,0.68);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.8px;
    }

    .input {
      height: 54px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(103,125,155,0.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.025)),
        rgba(8,16,29,0.58);
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .input:focus-within {
      border-color: rgba(45,212,191,0.56);
      box-shadow: 0 0 0 4px rgba(20,184,166,0.10), 0 0 28px rgba(20,184,166,0.10);
      transform: translateY(-1px);
    }

    .input svg {
      width: 18px;
      height: 18px;
      color: #99f6e4;
      flex: 0 0 auto;
    }

    .input input {
      width: 100%;
      height: 52px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 17px;
    }

    .input input::placeholder {
      color: rgba(203,213,225,0.48);
    }

    .input input:-webkit-autofill,
    .input input:-webkit-autofill:hover,
    .input input:-webkit-autofill:focus,
    .input input:-webkit-autofill:active {
      -webkit-text-fill-color: var(--text) !important;
      caret-color: var(--text);
      box-shadow: 0 0 0 1000px rgba(8,16,29,0.58) inset !important;
      -webkit-box-shadow: 0 0 0 1000px rgba(8,16,29,0.58) inset !important;
      border-radius: var(--radius-lg);
      transition: background-color 9999s ease-in-out 0s;
    }

    button {
      width: 100%;
      min-height: 56px;
      margin-top: 12px;
      border-radius: 18px;
      border: 1px solid rgba(45,212,191,0.40);
      background:
        linear-gradient(135deg, #07806b, #059669);
      color: #ecfeff;
      font-size: 19px;
      font-weight: 850;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(5,150,105,0.20), inset 0 1px 0 rgba(255,255,255,0.13);
      transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover, button:active {
      transform: translateY(-1px);
      filter: brightness(1.08);
      box-shadow: 0 22px 42px rgba(5,150,105,0.26), inset 0 1px 0 rgba(255,255,255,0.16);
    }

    @media (max-width: 520px) {
      .login-card {
        width: min(100%, 408px);
        padding: 30px 18px 24px;
        border-radius: 26px;
      }
      .login-form, .alert { width: min(100%, 318px); }
      .mark { width: 74px; height: 74px; border-radius: 50%; margin-bottom: 16px; }
      .mark img { width: 100%; height: 100%; }
      h1 { margin-bottom: 22px; }
      .input { height: 52px; border-radius: 17px; }
      .input input { height: 50px; font-size: 16px; }
      button { min-height: 54px; border-radius: 17px; }
    }
  </style>
</head>
<body>
  <div class="stage"></div>
  <main class="login-wrap">
    <section class="login-card">
      <div class="mark"><img src="{{ url_for('static', filename='login.png') }}" alt="登录 Logo"></div>
      <h1>{{ app_name or '登录' }}</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" class="login-form" autocomplete="on">
        <div class="field">
          <label for="username">用户名</label>
          <div class="input">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4.5 20a7.5 7.5 0 0 1 15 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <input id="username" name="username" type="text" placeholder="请输入用户名" autocomplete="username" required>
          </div>
        </div>

        <div class="field">
          <label for="password">密码</label>
          <div class="input">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M6.5 10h11A1.5 1.5 0 0 1 19 11.5v7A1.5 1.5 0 0 1 17.5 20h-11A1.5 1.5 0 0 1 5 18.5v-7A1.5 1.5 0 0 1 6.5 10Z" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" required>
          </div>
        </div>

        <button type="submit">登录</button>
      </form>

      <p style="
        margin: 28px 0 0;
        text-align: center;
        font-size: 12px;
        color: rgba(203,213,225,.35);
        letter-spacing: .6px;
        line-height: 1.6;
        user-select: none;
      ">竞争一文不值！</p>
    </section>
  </main>
</body>
</html>
